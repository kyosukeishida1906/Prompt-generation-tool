<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>深津式プロンプト生成ツール Pro</title>
<style>
body { font-family: 'Segoe UI', sans-serif; margin:0; background: linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; }
.container { max-width:1000px; margin:40px auto; background:#1e293b; padding:30px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.5);} 
h1 { text-align:center; margin-bottom:20px; }
label { margin-top:15px; display:block; font-weight:bold; }

/* ★ここ修正 */
textarea {
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:5px;
  background:#334155;
  color:#fff;
  min-height:100px; /* 約10行分 */

}

select {

  padding:10px; 
  border-radius:8px; 
  border:none; 
  margin-top:5px; 
  background:#334155; 
  color:#fff; 
}

.options, .mailOptions { margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; }
.card { background:#334155; padding:10px 15px; border-radius:8px; cursor:pointer; }
button { padding:10px 20px; border:none; border-radius:8px; margin-top:20px; cursor:pointer; }
.generate { background:#3b82f6; color:#fff; }
.copy { background:#22c55e; color:#fff; margin-left:10px; }

.chatgpt {

  color:#fff; 
  margin-left:10px; 
}

.oneclick {
  background:#f59e0b;
  color:#fff;
  margin-left:10px;
}

.gemini {
  background:#8e44ad;
  color:#fff;
  margin-left:10px;
}

</style>
</head>
<body>

<div class="container">
<h1>深津式プロンプト生成ツール Pro</h1>

<label>用途選択</label>
<select id="taskType" onchange="applyTemplate()">
<option value="">選択してください</option>
<option value="メール作成">メール作成</option>
<option value="アイディア発散">アイディア発散（ブレスト）</option>
<option value="アイディア深掘り">アイディア深掘り（具体化）</option>
<option value="アイディア評価">アイディア評価（比較）</option>
<option value="議事録テンプレ">議事録（テンプレ）</option>
<option value="Excel関数">Excel関数</option>
<option value="マニュアル作成">マニュアル作成</option>
<option value="原因分析">原因分析</option>
<option value="業務改善">業務改善提案</option>
<option value="改善VA">改善・VA提案書作成</option>
<option value="アジェンダ">アジェンダ作成</option>
<option value="要約">要約</option>
<option value="時短">時短アイディア</option>
<option value="ヒヤリハット">ヒヤリハット分析</option>
<option value="コード修正">コード修正</option>
</select>

<div id="mailTemplateArea" style="display:none;">
<label>メールテンプレ選択</label>
<div class="mailOptions">
<div class="card" onclick="setMailTemplate('business')">ビジネス</div>
<div class="card" onclick="setMailTemplate('internal')">社内</div>
<div class="card" onclick="setMailTemplate('casual')">チャット</div>
</div>
</div>

<label>＃命令書 あなたは［プロの○○］です。以下の制約条件と入力文をもとに、最高の結果を出力してください。</label>
<textarea id="instruction" rows="10"></textarea>

<label>＃制約条件[文字数やフォーマットの指定][トーン＆マナーの指定][絶対に避けるべき事項]</label>
<textarea id="constraints" rows="10"></textarea>

<label>＃入力文[背景、文脈、処理させたい生データなどを記述]</label>
<textarea id="inputText" rows="10"></textarea>

<label>＃出力文[出力してほしい具体的なレイアウトや構成を記述]</label>
<textarea id="outputFormat" rows="10"></textarea>

<label>オプション</label>
<div class="options">
<label><input type="checkbox" value="このタスクで最高の結果を出すために、追加の情報が必要な場合は質問してください。"> 追加質問</label>
<label><input type="checkbox" value="ステップバイステップで考え、順を追って出力してください。"> ステップ思考</label>
<label><input type="checkbox" value="専門家として最適な回答をしてください。"> 専門家</label>
</div>

<button class="generate" onclick="generatePrompt()">生成</button>
<button class="copy" onclick="copyPrompt()">コピー</button>
<button class="chatgpt" onclick="openChatGPT()">ChatGPTで開く</button>
<button class="oneclick" onclick="generateAndOpen()">ワンクリック実行</button>
<button class="gemini" onclick="openGemini()">Geminiで開く</button>

<div id="output"></div>
</div>

<script>
function applyTemplate(){
  const type = document.getElementById('taskType').value;

  // 一旦クリア（重要）
  document.getElementById('instruction').value = '';
  document.getElementById('constraints').value = '';
  document.getElementById('inputText').value = '';
  document.getElementById('outputFormat').value = '';

  // メールテンプレ表示制御
  document.getElementById('mailTemplateArea').style.display = 
    type === 'メール作成' ? 'block' : 'none';

  // ▼ここが重要（分岐をここに集約）
  if(type === 'アイディア発散') return setMailTemplate('idea_expand');
  if(type === 'アイディア深掘り') return setMailTemplate('idea_deepen');
  if(type === 'アイディア評価') return setMailTemplate('idea_evaluate');

  // それ以外はそのまま渡す
  setMailTemplate(type);
}

・クッション言葉を適切に使用
・結論を明確にする

・長すぎず簡潔にまとめる
・誤解を招く表現は禁止
・会社名・担当者名の体裁を整える`;

宛名：
本文：
（導入挨拶）
（要件・目的）
（詳細説明）
（依頼・お願い）
（締めの挨拶）

以下の制約条件と入力文を基に、読みやすく親しみやすいメッセージを作成してください。`;

  }
if(type==='idea_expand'){

既存の枠にとらわれず、多角的な視点から新しい発想を生み出してください。`;

if(type==='業務改善'){
document.getElementById('instruction').value =

現状の業務から改善アイディアを多角的に提案してください。`;

document.getElementById('constraints').value =

・実現性は問わない

・自由な発想`;

①

…`;
}

if(type==='改善VA'){
document.getElementById('instruction').value =

目的に応じた最適なアジェンダを作成してください。`;

事例からリスクと再発防止策を洗い出してください。`;

function generatePrompt(){
  const taskType = document.getElementById('taskType').value;
  const instruction = document.getElementById('instruction').value;
  const constraints = document.getElementById('constraints').value;
  const inputText = document.getElementById('inputText').value;
  const outputFormat = document.getElementById('outputFormat').value;

  const options = document.querySelectorAll('.options input:checked');
  let optionText='';
  options.forEach(opt=> optionText += opt.value + '\n');

  let prompt='';
  if(taskType) prompt += '【用途】\n'+taskType+'\n\n';
  prompt += '＃命令書:\n'+instruction+'\n\n';
  prompt += '＃制約条件:\n'+constraints+'\n\n';
  prompt += '＃入力文:\n'+inputText+'\n\n';
  prompt += '＃出力文:\n'+outputFormat+'\n\n';
  if(optionText) prompt += '＃追加指示:\n'+optionText;

  document.getElementById('output').textContent = prompt;
}

function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('output').textContent);
  alert('コピーしました');
}

function openChatGPT(){
  const prompt = document.getElementById('output').textContent;

  if(!prompt){
    alert('先にプロンプトを生成してください');
    return;
  }

  // ChatGPTを開く
    window.open('https://chat.openai.com/', '_blank');
}


// ★ワンクリック機能（外に出す）
function generateAndOpen(){
  // ① 生成
  generatePrompt();

  // ② 少し待ってから処理（重要）
  setTimeout(() => {
    const prompt = document.getElementById('output').textContent;

    if(!prompt){
      alert('プロンプトが生成されていません');
      return;
    }

    // ③ コピー
    navigator.clipboard.writeText(prompt);

    // ④ ChatGPTを開く
window.open('https://chat.openai.com/?prompt=' + encodeURIComponent(prompt), '_blank');
  }, 100);
}

function openGemini(){
  const prompt = document.getElementById('output').textContent;

  if(!prompt){
    alert('先にプロンプトを生成してください');
    return;
  }

  navigator.clipboard.writeText(prompt);

  window.open('https://gemini.google.com/gem/ec07e7f374be', '_blank');
}

</script>
